<!DOCTYPE html>
<html>
<head>

<title>EagleReach</title>

<style>

body{
font-family:Arial;
margin:0;
background:#eef1f7;
}

.navbar{
background:#2f4a92;
padding:15px;
text-align:center;
}

.navbar a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

.container{
text-align:center;
margin-top:60px;
}

input{
padding:10px;
width:180px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
background:#3b6ce1;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-left:5px;
}

.card{
margin-top:25px;
display:inline-block;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0px 3px 10px rgba(0,0,0,0.15);
width:300px;
}

</style>

</head>


<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="founder.html">Founder</a>
<a href="vote.html">How To Vote</a>
<a href="contact.html">Contact</a>
</div>


<div class="container">

<h2>EagleReach Civic Information Platform</h2>

<p>Find your representatives and civic resources.</p>

<input id="zip" placeholder="Enter ZIP code">

<button onclick="searchZip()">Search</button>

<button onclick="useLocation()">Use My Location</button>

<div id="result"></div>

</div>



<script>

const API="https://eaglereach-v2.onrender.com"


async function searchZip(){

let zip=document.getElementById("zip").value

if(zip.length!=5){
alert("Enter valid ZIP")
return
}

let r=await fetch(API+"/zip/"+zip)

let data=await r.json()

showResult(data)

}


async function useLocation(){

navigator.geolocation.getCurrentPosition(async function(position){

let lat=position.coords.latitude
let lon=position.coords.longitude

let geo=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`)

let geoData=await geo.json()

let zip=geoData.postcode

if(!zip){
alert("ZIP not detected")
return
}

let r=await fetch(API+"/zip/"+zip)

let data=await r.json()

showResult(data)

})

}


function showResult(data){

document.getElementById("result").innerHTML=

`
<div class="card">

<b>${data.city}, ${data.state}</b><br><br>

Latitude: ${data.latitude}<br>
Longitude: ${data.longitude}<br><br>

Senators<br>
${data.senators[0]}<br>
${data.senators[1]}<br><br>

Voting Information<br>
<a href="https://vote.gov" target="_blank">Vote.gov</a>

</div>
`

}

</script>

</body>
</html>
