<!DOCTYPE html>
<html>

<head>

<title>US EagleReach</title>

<style>

body{
font-family:Arial;
background:#eef1f7;
margin:0;
text-align:center;
}

.header{
background:#2f4a92;
color:white;
padding:15px;
font-weight:bold;
}

.container{
margin-top:60px;
}

input{
padding:10px;
width:180px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
background:#3b6ce1;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-left:5px;
}

.card{
margin-top:25px;
display:inline-block;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0px 3px 10px rgba(0,0,0,0.15);
width:260px;
}

.small{
font-size:12px;
color:#888;
margin-top:30px;
}

</style>

</head>


<body>

<div class="header">
US EagleReach — Civic Info Platform
</div>


<div class="container">

<h3>Enter ZIP Code</h3>

<input id="zip" placeholder="Enter ZIP code">

<button onclick="searchZip()">Search</button>

<button onclick="useLocation()">Use My Location</button>


<div id="result"></div>

<div class="small">
Open-source civic information platform
</div>

</div>



<script>

const API="https://eaglereach-v2.onrender.com"


async function searchZip(){

let zip=document.getElementById("zip").value

if(zip.length!=5){
alert("Enter valid ZIP")
return
}

let r=await fetch(API+"/zip/"+zip)

let data=await r.json()

showResult(data)

}



async function useLocation(){

if(!navigator.geolocation){
alert("Geolocation not supported")
return
}

navigator.geolocation.getCurrentPosition(async function(pos){

let lat = pos.coords.latitude
let lon = pos.coords.longitude

// Convert GPS → ZIP
let geo = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`)

let geoData = await geo.json()

let zip = geoData.postcode

if(!zip){
alert("Unable to detect ZIP from location")
return
}

// call EagleReach backend using detected ZIP
let r = await fetch(API + "/zip/" + zip)

let data = await r.json()

showResult(data)

})

}

function showResult(data){

document.getElementById("result").innerHTML=

`
<div class="card">

<b>${data.city}, ${data.state}</b><br><br>

Time<br>
${data.time}<br><br>

Weather<br>
Temperature: ${data.temperature} °C<br>
Wind: ${data.windspeed} km/h<br><br>

Location<br>
Lat: ${data.latitude}<br>
Lon: ${data.longitude}<br><br>

Senators<br>
${data.senators[0]}<br>
${data.senators[1]}<br><br>

News<br>
• ${data.news[0]}<br>
• ${data.news[1]}<br>
• ${data.news[2]}

</div>
`

}

</script>


</body>
</html>
