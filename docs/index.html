<!DOCTYPE html>

<html>

<head>

<title>EagleReach Civic Information Platform</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#eef1f7;
}

.navbar{
background:#2f4a92;
padding:15px;
text-align:center;
}

.navbar a{
color:white;
margin:0 20px;
text-decoration:none;
font-weight:bold;
}

.container{
text-align:center;
margin-top:60px;
}

input{
padding:10px;
width:220px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
background:#3b6ce1;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-left:5px;
}

.card{
margin-top:25px;
display:inline-block;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0px 3px 12px rgba(0,0,0,0.15);
width:360px;
}

</style>

</head>

<body>

<div class="navbar">

<a href="index.html">Home</a> <a href="about.html">About</a> <a href="founder.html">Founder</a> <a href="vote.html">How To Vote</a> <a href="contact.html">Contact</a>

</div>

<div class="container">

<h2>EagleReach Civic Information Platform</h2>

<p>Search by ZIP code or use your location.</p>

<input id="zip" placeholder="Enter ZIP code">

<button onclick="searchZip()">Search</button>

<button onclick="useLocation()">Use My Location</button>

<div id="result"></div>

</div>

<script>

const API="https://eaglereach-v2.onrender.com"


async function searchZip(){

try{

let zip=document.getElementById("zip").value

if(zip.length!=5){
alert("Enter valid ZIP code")
return
}

let r=await fetch(API+"/zip/"+zip)

let data=await r.json()

display(data)

}catch(error){

alert("API request failed")

}

}



async function useLocation(){

if(!navigator.geolocation){

alert("Geolocation not supported")

return

}

navigator.geolocation.getCurrentPosition(async function(position){

try{

let lat=position.coords.latitude
let lon=position.coords.longitude

let geo=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`)

let geoData=await geo.json()

let zip=geoData.postcode

if(!zip){

alert("ZIP not detected")

return

}

document.getElementById("zip").value=zip

let r=await fetch(API+"/zip/"+zip)

let data=await r.json()

display(data)

}catch(err){

alert("Location lookup failed")

}

})

}



function display(data){

let time=new Date().toLocaleString()

document.getElementById("result").innerHTML=

`
<div class="card">

<h3>${data.city}, ${data.state}</h3>

ZIP: ${data.zip}<br><br>

Latitude: ${data.latitude}<br>
Longitude: ${data.longitude}<br><br>

<b>US Senators</b><br>
${data.senators ? data.senators[0] : ""}<br>
${data.senators ? data.senators[1] : ""}<br><br>

<b>House Representative</b><br>
${data.representatives ? data.representatives[0] : ""}<br><br>

<b>Current Time</b><br>
${time}<br><br>

<b>Voting Information</b><br>
<a href="https://vote.gov" target="_blank">Go to Vote.gov</a>

</div>
`

}

</script>

</body>

</html>
