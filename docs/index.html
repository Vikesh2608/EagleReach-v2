<!DOCTYPE html>
<html>

<head>
<title>EagleReach</title>

<style>

body{
font-family:Arial;
margin:0;
background:#eef1f7;
}

.navbar{
background:#2f4a92;
padding:15px;
text-align:center;
}

.navbar a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

.container{
text-align:center;
margin-top:60px;
}

input{
padding:10px;
width:200px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
background:#3b6ce1;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-left:5px;
}

.card{
margin-top:25px;
display:inline-block;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0px 3px 10px rgba(0,0,0,0.15);
width:320px;
}

</style>

</head>

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="founder.html">Founder</a>
<a href="vote.html">How To Vote</a>
<a href="contact.html">Contact</a>
</div>

<div class="container">

<h2>EagleReach Civic Information Platform</h2>

<p>Search by ZIP code or use your location.</p>

<input id="zip" placeholder="Enter ZIP code">

<button onclick="searchZip()">Search</button>

<button onclick="useLocation()">Use My Location</button>

<div id="result"></div>

</div>


<script>

async function searchZip(){

let zip=document.getElementById("zip").value

if(zip.length!=5){
alert("Enter valid ZIP")
return
}

let r=await fetch(`https://api.zippopotam.us/us/${zip}`)

if(!r.ok){
alert("ZIP not found")
return
}

let data=await r.json()

let city=data.places[0]["place name"]
let state=data.places[0]["state"]

showResult(city,state,zip)

}



async function useLocation(){

navigator.geolocation.getCurrentPosition(async function(position){

let lat=position.coords.latitude
let lon=position.coords.longitude

let geo=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)

let geoData=await geo.json()

let city=geoData.address.city || geoData.address.town
let state=geoData.address.state
let zip=geoData.address.postcode

showResult(city,state,zip)

})

}



function showResult(city,state,zip){

let time=new Date().toLocaleString()

document.getElementById("result").innerHTML=

`
<div class="card">

<h3>${city}, ${state}</h3>

ZIP Code: ${zip}

<br><br>

Current Time<br>
${time}

<br><br>

Voting Information<br>
<a href="https://vote.gov" target="_blank">Go to Vote.gov</a>

<br><br>

Civic Awareness Message<br>
Voting in elections is an important civic duty.
Stay informed and participate in your local and national elections.

</div>
`

}

</script>

</body>
</html>
