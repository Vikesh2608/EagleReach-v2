<!DOCTYPE html>
<html>
<head>
<title>EagleReach</title>
<style>

body{
font-family: Arial;
background:#f4f6fb;
text-align:center;
padding:40px;
}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px 15px;
background:#2d6cdf;
color:white;
border:none;
cursor:pointer;
}

#result{
margin-top:30px;
font-size:18px;
}

</style>
</head>

<body>

<h1>EagleReach v2</h1>

<p>Enter ZIP Code</p>

<input id="zip" placeholder="45220">

<button onclick="searchZip()">Search</button>

<div id="result"></div>

<script>

const API="https://eaglereach-1.onrender.com"

async function searchZip(){

let zip=document.getElementById("zip").value

let r=await fetch(API+"/zip/"+zip)

let data=await r.json()

document.getElementById("result").innerHTML=`

City: ${data.city}<br>
State: ${data.state}

`

}

</script>

</body>
</html>
