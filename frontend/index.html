<!DOCTYPE html>
<html>

<head>
<title>EagleReach</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
text-align:center;
margin-top:80px;
}

h1{
color:#1e3a8a;
}

input{
padding:10px;
font-size:16px;
width:200px;
}

button{
padding:10px 15px;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

.result{
margin-top:30px;
font-size:18px;
}

</style>

</head>

<body>

<h1>EagleReach</h1>

<p>Find location details by ZIP code</p>

<input id="zip" placeholder="Enter ZIP code">

<button onclick="searchZip()">Search</button>

<div class="result" id="result"></div>

<script>

const API="https://eaglereach-v2.onrender.com"

async function searchZip(){

let zip=document.getElementById("zip").value

let r=await fetch(API+"/zip/"+zip)

let data=await r.json()

document.getElementById("result").innerHTML=

`
City: ${data.city} <br>
State: ${data.state} <br>
Latitude: ${data.latitude} <br>
Longitude: ${data.longitude}
`

}

</script>

</body>
</html>
